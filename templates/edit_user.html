{% extends "base.html" %}
{% block title %}Edit User{% endblock %}
{% block content %}

<div class="card shadow-lg border-0 mx-auto" style="max-width: 500px;">
  <div class="card-header bg-primary text-white text-center">
    <i class="fas fa-user-edit"></i> Edit User Role
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" class="form-control" value="{{ user.username }}" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Current Role</label>
        <input type="text" class="form-control" value="{{ user.role }}" readonly>
      </div>

      <div class="mb-3">
        <label for="role" class="form-label fw-bold">New Role</label>
        <select name="role" id="role" class="form-select" required>
          <option value="">Select Role</option>
          <option value="user">User</option>
          <option value="doctor">Doctor</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-success">
          <i class="fas fa-save"></i> Save Changes
        </button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Back
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
