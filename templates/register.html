<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Lung Segmentation</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom right, #e0f7fa, #f8f9fa);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #2c3e50;
            overflow-x: hidden;
        }

        /* Registration Box */
        .box {
            background: #fff;
            padding: 35px 25px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.8em;
            color: #2c3e50;
        }

        /* Input Fields */
        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52,152,219,0.5);
            outline: none;
        }

        /* Register Button */
        button {
            width: 95%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.2);
            transform: skewX(-20deg);
            transition: all 0.4s ease;
        }

        button:hover::after {
            left: 100%;
        }

        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* Links */
        a {
            text-decoration: none;
            color: #3498db;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #2980b9;
        }

        p {
            margin-top: 12px;
            font-size: 0.95em;
        }

        /* Flash Messages */
        .flash p {
            font-weight: bold;
            margin: 5px 0;
            font-size: 0.95em;
        }

        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Register</h2>

        {% with messages = get_flashed_messages(with_categories=True) %}
          {% if messages %}
            <div class="flash">
              {% for category, msg in messages %}
                <p class="{% if category == 'success' %}success{% else %}error{% endif %}">{{ msg }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <select name="role" required>
                <option value="" disabled selected>Select Role</option>
                <option value="user">User</option>
                <option value="doctor">Doctor</option>
                <!-- Admin option removed -->
            </select><br>
            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="{{ url_for('home') }}">Login here</a></p>
    </div>
</body>
</html>
